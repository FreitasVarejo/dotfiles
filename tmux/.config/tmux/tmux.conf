# vim: ft=tmux

# General config

set -g prefix C-s
set-option -g repeat-time 100
set-option -g focus-events on

# Fix escape time for Neovim
set -sg escape-time 0

# UTF-8 Locale Support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

set -g mouse on

# Window naming configuration - KEEP IT SIMPLE
set -g automatic-rename on
#set -g automatic-rename-format "#{pane_current_command}"

# Copy Mode settings (Bindings are in bindings.conf)
set -s set-clipboard on
setw -g mode-keys vi

# Imports

source-file ~/.config/tmux/bindings.conf
source-file ~/.config/tmux/colors.conf
source-file ~/.config/tmux/theme.conf
source-file ~/.config/tmux/statusline.conf

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize TPM (Keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
