unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

set -g prefix C-s

# Fix escape time for Neovim (legacy issue)
set -sg escape-time 0

# UTF-8 Locale Support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# True Color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g mouse on

# --- NAVIGATION (Vim-Tmux-Navigator handled by plugin) ---
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# --- COPY MODE ---
set -s set-clipboard on
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- PLUGINS ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'

# --- THEME CONFIG (Catppuccin) ---
# Machine-specific theme detection
%if "#{==:#{hostname},fedora-41}"
  set -g @catppuccin_flavour 'mocha'       # gray/cool, neutral
%elif "#{==:#{hostname},pi02}"
  set -g @catppuccin_flavour 'macchiato'   # soft/warm, easier on low-light
%elif "#{==:#{hostname},BTGNOTE10113}"
  set -g @catppuccin_flavour 'frappe'      # cooler/blue, professional
%else
  set -g @catppuccin_flavour 'mocha'       # default fallback
%endif
set -g @catppuccin_window_left_separator "<U+E0B6>"
set -g @catppuccin_window_right_separator "<U+E0B4> "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

set -g @catppuccin_status_modules_right "directory user host session"
set -g @catppuccin_status_left_separator  " <U+E0B6>"
set -g @catppuccin_status_right_separator "<U+E0B4>"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_directory_text "#{pane_current_path}"

# Initialize TPM (Keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
