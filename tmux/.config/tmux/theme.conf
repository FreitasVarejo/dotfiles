# vim: ft=tmux
# Theme configuration - Solarized Dark
# Color references are in colors.conf

# --- STATUSBAR COLORS ---
# Default statusbar: base02 background, base1 text
set-option -g status-style bg=colour235,fg=colour136,default

# --- WINDOW COLORS ---
# Inactive windows: base01 text, base02 background
set-window-option -g window-status-style fg=colour244,bg=colour234,dim

# Active/current window: orange text, default background
set-window-option -g window-status-current-style fg=colour166,bg=default,bright

# --- PANE BORDERS ---
# Inactive border: base02 (#073642)
set-option -g pane-border-style fg=colour235

# Active border: base1 text on base02 background
set-option -g pane-active-border-style fg=colour136,bg=colour235

# --- MESSAGE COLORS ---
# Message text: orange on dark background
set-option -g message-style bg=colour235,fg=colour166

# --- PANE DISPLAY COLORS ---
# Active pane number: blue
set-option -g display-panes-active-colour colour33

# Inactive pane number: orange
set-option -g display-panes-colour colour166

# --- CLOCK ---
# Clock mode: green
set-window-option -g clock-mode-colour colour64
