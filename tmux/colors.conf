# vim: ft=tmux
# Central color palette - Solarized Dark Theme
# Note: Tmux doesn't support variable substitution in set-option,
# so we use direct color values with comments for reference

#### SOLARIZED PALETTE ####
# Base colors
# base03: #002b36 - darkest background
# base02: #073642 - darker background  
# base01: #586e75 - dark text
# base00: #657b83 - medium text
# base0:  #839496 - light text
# base1:  #93a1a1 - lighter text
# base2:  #eee8d5 - light background
# base3:  #fdf6e3 - lightest background

# Accent colors
# yellow:  #b58900
# orange:  #cb4b16
# red:     #dc322f
# magenta: #d33682
# violet:  #6c71c4
# blue:    #268bd2
# cyan:    #2aa198
# green:   #859900

#### LEGACY PALETTE (for compatibility) ####
# colour235 - darkest
# colour234 - dark
# colour244 - medium
# colour166 - orange
# colour136 - yellow
# colour33  - blue
# colour64  - green
